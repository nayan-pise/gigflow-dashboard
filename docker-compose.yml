version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: gigflow_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - gigflow_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gigflow_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/gigflow
      - JWT_SECRET=supersecretjwtkey_for_gigflow_assignment
      - FRONTEND_URL=http://localhost:5173
    depends_on:
      - mongodb
    networks:
      - gigflow_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gigflow_frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - gigflow_network

volumes:
  mongodb_data:

networks:
  gigflow_network:
    driver: bridge
